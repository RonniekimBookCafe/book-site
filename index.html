<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Ronnie Kim Books | Official Book Collection</title>
  <meta name="description" content="Ronnie Kim Books 공식 도서 허브입니다. 한국어와 영어로 출간 도서, 목차, 샘플 본문, FAQ, 구매 링크를 확인하세요." />

  <link rel="canonical" href="https://ronniekimbooks.com/" />

  <meta property="og:type" content="website" />
  <meta property="og:title" content="Ronnie Kim Books | Official Book Collection" />
  <meta property="og:description" content="Explore Ronnie Kim Books in Korean and English, including book pages, sample chapters, FAQs, and purchase links." />
  <meta property="og:url" content="https://ronniekimbooks.com/" />
  <meta property="og:image" content="https://ronniekimbooks.com/assets/images/books/book-001/og.webp" />

  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Ronnie Kim Books | Official Book Collection" />
  <meta name="twitter:description" content="Explore Ronnie Kim Books in Korean and English, including book pages, sample chapters, FAQs, and purchase links." />
  <meta name="twitter:image" content="https://ronniekimbooks.com/assets/images/books/book-001/og.webp" />

  <link rel="stylesheet" href="./assets/css/style.css" />

  <style>
    .site-header {
      position: relative;
    }

    .language-switch {
      position: absolute;
      top: 22px;
      right: 28px;
      display: flex;
      gap: 8px;
      align-items: center;
      font-size: 14px;
      font-weight: 800;
    }

    .language-switch button {
      cursor: pointer;
      color: #ffffff;
      background: transparent;
      border: 1px solid rgba(255, 255, 255, 0.35);
      border-radius: 999px;
      padding: 7px 12px;
      font: inherit;
    }

    .language-switch button:hover {
      background: rgba(255, 255, 255, 0.12);
    }

    .language-switch button.active {
      background: #ffffff;
      color: #111827;
      border-color: #ffffff;
    }

    .book-card-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 18px;
    }

    .book-card-actions a {
      display: inline-block;
      padding: 11px 15px;
      border-radius: 10px;
      text-decoration: none;
      font-weight: 800;
      background: #111827;
      color: #ffffff;
    }

    @media (max-width: 800px) {
      .language-switch {
        position: static;
        justify-content: center;
        margin-top: 18px;
      }
    }
  </style>
</head>

<body>
  <header class="site-header">
    <nav class="language-switch" aria-label="Language selection">
      <button type="button" id="lang-ko">한국어</button>
      <button type="button" id="lang-en">English</button>
    </nav>

    <h1>Ronnie Kim Books</h1>
    <p id="site-subtitle">출간 도서와 샘플 본문을 한국어로 확인하세요.</p>
  </header>

  <main class="home-main">
    <h2 class="section-title" id="section-title">출간 도서</h2>

    <section class="book-grid">
      <article class="book-card">
        <img
          class="book-cover-thumb"
          src="./assets/images/books/book-001/cover-thumb.webp"
          alt="개발자는 회사를 얼마나 더 오래 다닐 수 있을까요? 책 표지"
          id="book-cover"
        />

        <h3 id="book-title">개발자는 회사를 얼마나 더 오래 다닐 수 있을까요?</h3>

        <p id="book-description">
          AI 시대 개발자의 생존 전략과 시장가치 재설계를 다룬 책입니다.
        </p>

        <div class="book-card-actions">
          <a id="book-link" href="./ko/books/book-001/">책 보기</a>
        </div>
      </article>
    </section>
  </main>

  <footer class="site-footer">
    <p>© Ronnie Kim Books. All rights reserved.</p>
  </footer>

  <script>
    const content = {
      ko: {
        htmlLang: "ko",
        subtitle: "출간 도서와 샘플 본문을 한국어로 확인하세요.",
        sectionTitle: "출간 도서",
        bookTitle: "개발자는 회사를 얼마나 더 오래 다닐 수 있을까요?",
        bookDescription: "AI 시대 개발자의 생존 전략과 시장가치 재설계를 다룬 책입니다.",
        bookLinkText: "책 보기",
        bookLinkHref: "./ko/books/book-001/",
        coverAlt: "개발자는 회사를 얼마나 더 오래 다닐 수 있을까요? 책 표지"
      },
      en: {
        htmlLang: "en",
        subtitle: "Explore books and sample chapters in English.",
        sectionTitle: "Published Books",
        bookTitle: "How Long Will Developers Still Be Needed?",
        bookDescription: "A practical career survival guide for developers navigating AI, automation, and changing market value.",
        bookLinkText: "View Book",
        bookLinkHref: "./en/books/book-001/",
        coverAlt: "Book cover of How Long Will Developers Still Be Needed?"
      }
    };

    const koButton = document.getElementById("lang-ko");
    const enButton = document.getElementById("lang-en");

    const siteSubtitle = document.getElementById("site-subtitle");
    const sectionTitle = document.getElementById("section-title");
    const bookTitle = document.getElementById("book-title");
    const bookDescription = document.getElementById("book-description");
    const bookLink = document.getElementById("book-link");
    const bookCover = document.getElementById("book-cover");

    function setLanguage(lang) {
      const selected = content[lang] || content.ko;

      document.documentElement.lang = selected.htmlLang;
      siteSubtitle.textContent = selected.subtitle;
      sectionTitle.textContent = selected.sectionTitle;
      bookTitle.textContent = selected.bookTitle;
      bookDescription.textContent = selected.bookDescription;
      bookLink.textContent = selected.bookLinkText;
      bookLink.href = selected.bookLinkHref;
      bookCover.alt = selected.coverAlt;

      koButton.classList.toggle("active", lang === "ko");
      enButton.classList.toggle("active", lang === "en");

      localStorage.setItem("siteLanguage", lang);
    }

    koButton.addEventListener("click", function () {
      setLanguage("ko");
    });

    enButton.addEventListener("click", function () {
      setLanguage("en");
    });

    const savedLanguage = localStorage.getItem("siteLanguage");
    const browserLanguage = navigator.language || navigator.userLanguage;
    const initialLanguage = savedLanguage || (browserLanguage && browserLanguage.toLowerCase().startsWith("ko") ? "ko" : "en");

    setLanguage(initialLanguage);
  </script>
</body>
</html>
