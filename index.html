<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Ronnie Kim Books | Official Book Collection</title>
  <meta name="description" content="Ronnie Kim Books 공식 도서 허브입니다. 한국어와 영어로 출간 도서, 목차, 샘플 본문, FAQ, 구매 링크를 확인하세요." />

  <link rel="canonical" href="https://ronniekimbooks.com/" />

  <meta property="og:type" content="website" />
  <meta property="og:title" content="Ronnie Kim Books | Official Book Collection" />
  <meta property="og:description" content="Explore Ronnie Kim Books in Korean and English, including book pages, sample chapters, FAQs, and purchase links." />
  <meta property="og:url" content="https://ronniekimbooks.com/" />
  <meta property="og:image" content="https://ronniekimbooks.com/assets/images/books/book-001/og.webp" />

  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Ronnie Kim Books | Official Book Collection" />
  <meta name="twitter:description" content="Explore Ronnie Kim Books in Korean and English, including book pages, sample chapters, FAQs, and purchase links." />
  <meta name="twitter:image" content="https://ronniekimbooks.com/assets/images/books/book-001/og.webp" />

  <link rel="stylesheet" href="./assets/css/style.css" />

  <style>
    .site-header {
      position: relative;
    }

    .language-switch {
      position: absolute;
      top: 22px;
      right: 28px;
      display: flex;
      gap: 8px;
      align-items: center;
      font-size: 14px;
      font-weight: 800;
    }

    .language-switch button {
      cursor: pointer;
      color: #ffffff;
      background: transparent;
      border: 1px solid rgba(255, 255, 255, 0.35);
      border-radius: 999px;
      padding: 7px 12px;
      font: inherit;
    }

    .language-switch button:hover {
      background: rgba(255, 255, 255, 0.12);
    }

    .language-switch button.active {
      background: #ffffff;
      color: #111827;
      border-color: #ffffff;
    }

    .home-book-grid {
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 28px;
      align-items: start;
    }

    .compact-book-card {
      padding: 18px;
      text-align: left;
    }

    .book-cover-link {
      display: block;
      text-align: center;
      margin-bottom: 16px;
    }

    .compact-book-card .book-cover-thumb {
      width: 100%;
      max-width: 170px;
      height: auto;
      border-radius: 10px;
      box-shadow: 0 12px 24px rgba(0, 0, 0, 0.12);
    }

    .compact-book-card h3 {
      margin: 0 0 10px;
      font-size: 18px;
      line-height: 1.45;
    }

    .compact-book-card p {
      margin: 0 0 14px;
      color: #374151;
      font-size: 15px;
      line-height: 1.65;
    }

    .book-card-button {
      display: inline-block;
      padding: 9px 13px;
      border-radius: 9px;
      background: #111827;
      color: #ffffff;
      text-decoration: none;
      font-size: 14px;
      font-weight: 800;
    }

    @media (max-width: 1100px) {
      .home-book-grid {
        grid-template-columns: repeat(4, minmax(0, 1fr));
      }
    }

    @media (max-width: 900px) {
      .home-book-grid {
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }
    }

    @media (max-width: 700px) {
      .language-switch {
        position: static;
        justify-content: center;
        margin-top: 18px;
      }

      .home-book-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 18px;
      }

      .compact-book-card {
        padding: 14px;
      }

      .compact-book-card h3 {
        font-size: 16px;
      }

      .compact-book-card p {
        font-size: 14px;
      }
    }
    

    .book-tools {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin: 0 0 22px;
    }

    .book-search,
    .book-select {
      height: 44px;
      padding: 0 14px;
      border: 1px solid #d1d5db;
      border-radius: 10px;
      background: #ffffff;
      color: #111827;
      font-size: 15px;
    }

    .book-search {
      flex: 1 1 260px;
    }

    .book-select {
      flex: 0 0 160px;
    }

    .book-count {
      margin: 0 0 18px;
      color: #6b7280;
      font-size: 14px;
      font-weight: 700;
    }

    .empty-message {
      margin-top: 28px;
      padding: 28px;
      background: #f9fafb;
      border: 1px solid #e5e7eb;
      border-radius: 14px;
      color: #374151;
      text-align: center;
      font-weight: 800;
    }

    @media (max-width: 700px) {
      .book-tools {
        display: grid;
      }

      .book-search,
      .book-select {
        width: 100%;
      }
    }
    
  </style>
</head>

<body>
  <header class="site-header">
    <nav class="language-switch" aria-label="Language selection">
      <button type="button" id="lang-ko">한국어</button>
      <button type="button" id="lang-en">English</button>
    </nav>

    <h1>Ronnie Kim Books</h1>
    <p id="site-subtitle">출간 도서와 샘플 본문을 한국어로 확인하세요.</p>
  </header>

<main class="home-main">
  <h2 class="section-title" id="section-title">출간 도서</h2>

  <section class="book-tools" aria-label="Book search and filter tools">
    <input
      type="search"
      id="book-search"
      class="book-search"
      placeholder="책 제목 또는 설명 검색"
      aria-label="Search books"
    />

    <select id="book-category" class="book-select" aria-label="Filter by category">
      <option value="all">전체 카테고리</option>
      <option value="career">커리어</option>
      <option value="education">교육</option>
      <option value="essay">에세이</option>
      <option value="tech">기술</option>
    </select>

    <select id="book-sort" class="book-select" aria-label="Sort books">
      <option value="featured">추천순</option>
      <option value="newest">최신순</option>
      <option value="oldest">오래된순</option>
      <option value="title">제목순</option>
    </select>
  </section>

  <p id="book-count" class="book-count"></p>

  <section class="book-grid home-book-grid" id="book-grid"></section>

  <p id="empty-message" class="empty-message" hidden>
    검색 결과가 없습니다.
  </p>
</main>

  <footer class="site-footer">
    <p>© Ronnie Kim Books. All rights reserved.</p>
  </footer>

  <script src="./assets/js/books-data.js"></script>
  <script src="./assets/js/home.js"></script>
</body>
</html>
