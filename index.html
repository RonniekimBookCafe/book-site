<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>공식 도서 허브 | 출간 도서 목록</title>
  <meta name="description" content="출간 도서, 목차, 샘플 본문, FAQ, 구매 링크를 한곳에서 확인할 수 있는 공식 도서 허브입니다." />

  <style>
    body {
      margin: 0;
      font-family: Arial, "Noto Sans KR", sans-serif;
      background: #f7f8fa;
      color: #222;
      line-height: 1.6;
    }

    header {
      background: #111827;
      color: white;
      padding: 48px 24px;
      text-align: center;
    }

    header h1 {
      margin: 0 0 12px;
      font-size: 36px;
    }

    header p {
      margin: 0;
      font-size: 18px;
      color: #d1d5db;
    }

    main {
      max-width: 1100px;
      margin: 40px auto;
      padding: 0 24px;
    }

    .section-title {
      font-size: 28px;
      margin-bottom: 24px;
    }

    .book-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 24px;
    }

    .book-card {
      background: white;
      border: 1px solid #e5e7eb;
      border-radius: 16px;
      padding: 24px;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.04);
    }

    .book-card h3 {
      margin-top: 0;
      font-size: 22px;
      line-height: 1.35;
    }

    .book-card p {
      color: #4b5563;
    }

    .book-card a {
      display: inline-block;
      margin-top: 12px;
      padding: 10px 16px;
      background: #111827;
      color: white;
      text-decoration: none;
      border-radius: 8px;
      font-weight: 700;
    }

    footer {
      margin-top: 60px;
      padding: 32px 24px;
      text-align: center;
      color: #6b7280;
      border-top: 1px solid #e5e7eb;
    }
  </style>
</head>

<body>
  <header>
    <h1>공식 도서 허브</h1>
    <p>출간 도서, 목차, 샘플 본문, FAQ, 구매 링크를 한곳에서 확인하세요.</p>
  </header>

  <main>
    <h2 class="section-title">출간 도서</h2>

    <section class="book-grid">
      <article class="book-card">
        <h3>개발자는 회사를 얼마나 더 오래 다닐 수 있을까요?</h3>
        <p>
          AI 시대 개발자의 생존 전략과 시장가치 재설계를 다룬 책입니다.
        </p>
        <a href="./ko/books/book-001/">책 보기</a>
      </article>
    </section>
  </main>

  <footer>
    <p>© RonniekimBookCafe. All rights reserved.</p>
  </footer>
</body>
</html>
